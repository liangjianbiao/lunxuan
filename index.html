<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL遍历工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .url-list {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .url-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            font-size: 0.9rem;
            color: #333;
        }

        .url-item i {
            margin-right: 12px;
            color: #667eea;
        }

        .controls {
            text-align: center;
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.stop {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .btn.stop:hover:not(:disabled) {
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.5);
        }

        .progress-section {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .progress-stats {
            font-size: 0.9rem;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .log-container {
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 10px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .log-container::-webkit-scrollbar {
            width: 6px;
        }

        .log-container::-webkit-scrollbar-track {
            background: #34495e;
            border-radius: 3px;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: #764ba2;
            border-radius: 3px;
        }

        .log-success {
            color: #2ecc71;
        }

        .log-error {
            color: #e74c3c;
        }

        .log-info {
            color: #3498db;
        }

        .log-warning {
            color: #f39c12;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .config-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .config-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .config-label {
            color: #555;
            font-size: 0.9rem;
        }

        .config-input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        .config-input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 URL遍历工具</h1>

        <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 0.9rem; color: #856404;">
            ⚠️ <strong>提示：</strong>请允许浏览器弹出窗口，否则新标签页可能无法打开。首次点击"开始遍历"时，浏览器可能会提示是否允许弹出窗口，请选择"允许"。
        </div>

        <div class="config-section">
            <div class="config-title">⚙️ 配置参数</div>
            <div class="config-item">
                <span class="config-label">循环次数:</span>
                <input type="number" id="loopCount" class="config-input" value="10" min="1" max="1000">
            </div>
            <div class="config-item">
                <span class="config-label">停留时间(秒):</span>
                <input type="number" id="stayTime" class="config-input" value="4" min="1" max="60">
            </div>
        </div>

        <div class="url-list">
            <div class="url-item">
                <i>🏠</i> https://www.kanjl.com/
            </div>
            <div class="url-item">
                <i>🧪</i> https://www.kanjl.com/tests
            </div>
            <div class="url-item">
                <i>🌳</i> https://www.kanjl.com/treehole
            </div>
            <div class="url-item">
                <i>📰</i> https://www.kanjl.com/articles
            </div>
            <div class="url-item">
                <i>✨</i> https://www.kanjl.com/fashion
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn">
                ▶️ 开始遍历
            </button>
            <button id="stopBtn" class="btn stop" style="display: none;">
                ⏹️ 停止遍历
            </button>
        </div>

        <div id="progressSection" class="progress-section">
            <div class="progress-header">
                <span class="progress-title">
                    <span class="status-dot"></span> 遍历进行中
                </span>
                <span class="progress-stats" id="progressStats">
                    循环: 0/0 | URL: 0/5
                </span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const urls = [
            { name: '首页', url: 'https://www.kanjl.com/' },
            { name: '心理测试', url: 'https://www.kanjl.com/tests' },
            { name: '情绪树洞', url: 'https://www.kanjl.com/treehole' },
            { name: '资讯', url: 'https://www.kanjl.com/articles' },
            { name: '时尚', url: 'https://www.kanjl.com/fashion' }
        ];

        let isRunning = false;
        let currentLoop = 0;
        let totalLoops = 10;
        let stayTime = 5;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressSection = document.getElementById('progressSection');
        const progressStats = document.getElementById('progressStats');
        const progressFill = document.getElementById('progressFill');
        const logContainer = document.getElementById('logContainer');
        const loopCountInput = document.getElementById('loopCount');
        const stayTimeInput = document.getElementById('stayTime');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logClass = `log-${type}`;
            const logItem = document.createElement('div');
            logItem.innerHTML = `<span>[${timestamp}]</span> ${message}`;
            logItem.className = logClass;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateProgress() {
            const totalSteps = totalLoops * urls.length;
            const currentStep = (currentLoop - 1) * urls.length + currentUrlIndex;
            const progress = (currentStep / totalSteps) * 100;
            progressFill.style.width = `${progress}%`;
            progressStats.textContent = `循环: ${currentLoop}/${totalLoops} | URL: ${currentUrlIndex + 1}/${urls.length}`;
        }

        async function sleep(seconds) {
            for (let i = seconds; i > 0; i--) {
                if (!isRunning) break;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }

        let openedWindow = null;
        let currentUrlIndex = 0;

        function openUrlInNewTab(url) {
            try {
                // 关闭之前打开的窗口（可选）
                if (openedWindow && !openedWindow.closed) {
                    openedWindow.close();
                }
                // 打开新标签页
                openedWindow = window.open(url, '_blank');
                if (openedWindow) {
                    return { success: true, status: '成功打开新标签页' };
                } else {
                    return { success: false, status: '浏览器阻止了弹出窗口' };
                }
            } catch (error) {
                return { success: false, status: error.message };
            }
        }

        async function runTraversal() {
            isRunning = true;
            currentLoop = 0;
            
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            progressSection.classList.add('active');
            logContainer.innerHTML = '';

            log('=== 开始URL遍历任务 ===', 'info');
            log(`总循环次数: ${totalLoops}`, 'info');
            log(`每个URL停留时间: ${stayTime}秒`, 'info');

            for (currentLoop = 1; currentLoop <= totalLoops && isRunning; currentLoop++) {
                log(`\n=== 第 ${currentLoop} 次循环 ===`, 'info');

                for (currentUrlIndex = 0; currentUrlIndex < urls.length && isRunning; currentUrlIndex++) {
                    const { name, url } = urls[currentUrlIndex];
                    updateProgress();

                    log(`正在访问 [${name}]: ${url}`, 'info');

                    const result = openUrlInNewTab(url);
                    if (result.success) {
                        log(`✅ 成功打开新标签页`, 'success');
                    } else {
                        log(`❌ 打开失败: ${result.status}`, 'error');
                    }

                    if (isRunning) {
                        log(`⏳ 停留 ${stayTime} 秒...`, 'warning');
                        // 显示倒计时
                        for (let i = stayTime; i > 0 && isRunning; i--) {
                            log(`   剩余 ${i} 秒...`, 'info');
                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                        log(`⏭️ 停留完成，准备访问下一个URL`, 'info');
                    }
                }

                if (isRunning) {
                    log(`✅ 第 ${currentLoop} 次循环完成`, 'success');
                }
            }

            if (isRunning) {
                log('\n=== 所有循环完成 ===', 'success');
            } else {
                log('\n=== 遍历已停止 ===', 'warning');
            }

            isRunning = false;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            progressFill.style.width = '100%';
        }

        startBtn.addEventListener('click', () => {
            totalLoops = parseInt(loopCountInput.value) || 10;
            stayTime = parseInt(stayTimeInput.value) || 4;
            runTraversal();
        });

        stopBtn.addEventListener('click', () => {
            isRunning = false;
            log('⏹️ 用户请求停止', 'warning');
        });
    </script>
</body>
</html>
